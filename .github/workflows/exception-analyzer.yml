name: Exception Analyzer

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

jobs:
  analyze-exceptions:
    runs-on: ubuntu-latest
    environment: jira-github-workflow-p
    permissions:
      contents: read
      issues: write
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Azure CLI Login
        run: |
          az login --service-principal \
            -u "$AZURE_CLIENT_ID" \
            -p "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID"
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Query exceptions from Log Analytics
        run: |
          az monitor log-analytics query \
            --workspace "a53c2ee0-9900-4756-b9c1-ab1b96a28d87" \
            --analytics-query "exceptions | where timestamp > ago(24h) | summarize Count=count(), LatestOccurrence=max(timestamp), EarliestOccurrence=min(timestamp) by problemId, type, outerMessage | top 2 by Count desc" \
            --output json > /tmp/exceptions.json

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          GH_REPO: ${{ github.repository }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: |
            --model claude-sonnet-4-6
            --dangerously-skip-permissions
          prompt: |
            You are an SRE analyzing application exceptions.

            Run this command to get the exception data: cat /tmp/exceptions.json

            Analyze the exceptions and use the `gh` CLI to create a GitHub issue in the ${{ github.repository }} repository with:
            - Title: "Exception Report - <today's date>"
            - Body summarizing:
              - The top exceptions by count
              - Severity assessment
              - Possible root causes
              - Recommended actions

            Use this command to create the issue:
            gh issue create --repo ${{ github.repository }} --title "..." --body "..."
