name: Exception Analyzer

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

jobs:
  analyze-exceptions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Azure CLI Login
        run: |
          az login --service-principal \
            -u "$AZURE_CLIENT_ID" \
            -p "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID"
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: |
            --model claude-sonnet-4-6
            --dangerously-skip-permissions
          prompt: |
            You are an SRE analyzing application exceptions. Here is the exception data from the last 24 hours from Azure Log Analytics:

            ${{ steps.query.outputs.result }}

            Analyze the exceptions and create a GitHub issue summarizing:
            - The top exceptions by count
            - Severity assessment
            - Possible root causes
            - Recommended actions

            Title the issue: "Exception Report - <today's date>"
            Label the issue with "exception-report" if that label exists, otherwise no label.
